<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" fill="none">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7b5ea7"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#00ffaa"/>
    </linearGradient>
  </defs>

  <!-- Icon Box -->
  <rect x="0" y="5" width="40" height="40" rx="10" fill="url(#iconGrad)"/>

  <!-- Brain circuit lines inside box -->
  <circle cx="20" cy="20" r="7" stroke="white" stroke-width="1.5" fill="none" opacity="0.9"/>
  <line x1="20" y1="8"  x2="20" y2="13" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="27" x2="20" y2="32" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="8"  y1="20" x2="13" y2="20" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="27" y1="20" x2="32" y2="20" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="20" cy="20" r="2.5" fill="white"/>
  <circle cx="20" cy="10" r="2"   fill="white" opacity="0.8"/>
  <circle cx="20" cy="30" r="2"   fill="white" opacity="0.8"/>
  <circle cx="10" cy="20" r="2"   fill="white" opacity="0.8"/>
  <circle cx="30" cy="20" r="2"   fill="white" opacity="0.8"/>

  <!-- Glow dot top-right -->
  <circle cx="34" cy="11" r="3" fill="#00ffaa" opacity="0.9"/>

  <!-- Company Name -->
  <text x="48" y="28" font-family="'Syne', 'Arial Black', sans-serif" font-weight="800" font-size="18" fill="url(#textGrad)">AI</text>
  <text x="72" y="28" font-family="'Syne', 'Arial Black', sans-serif" font-weight="800" font-size="18" fill="white">-Solutions</text>

  <!-- Tagline -->
  <text x="48" y="40" font-family="'DM Sans', Arial, sans-serif" font-weight="400" font-size="7.5" fill="#5a6a84" letter-spacing="1.5">INTELLIGENT AI SOFTWARE</text>
</svg>
